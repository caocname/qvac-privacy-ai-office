<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src http://127.0.0.1:18888; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>QVAC Hackathon 离线 AI 办公助手</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- 侧边导航栏 -->
    <nav id="sidebar">
      <div class="nav-header">
        <h1>QVAC 办公助手</h1>
        <span id="status-badge" class="badge badge-idle">就绪</span>
      </div>
      <ul class="nav-list">
        <li class="nav-item active" data-page="chat">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor"/>
          </svg>
          <span>对话</span>
        </li>
        <li class="nav-item" data-page="knowledge">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="currentColor"/>
            <polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>知识库</span>
        </li>
        <li class="nav-item" data-page="audit">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18">
            <path d="M12 20h9" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" fill="currentColor"/>
          </svg>
          <span>审计日志</span>
        </li>
        <li class="nav-item" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" width="18" height="18">
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
            <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>系统设置</span>
        </li>
      </ul>
      <div class="nav-footer">
        <span id="connection-dot" class="dot dot-disconnected"></span>
        <span class="footer-text">后端状态</span>
      </div>
    </nav>

    <!-- 主内容区 -->
    <main id="content">
      <!-- 对话页 -->
      <section id="page-chat" class="page active">
        <div class="chat-container">
          <div id="chat-messages" class="chat-messages">
            <div class="chat-placeholder">
              <div class="placeholder-icon">
                <svg viewBox="0 0 24 24" width="48" height="48">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor" opacity="0.3"/>
                </svg>
              </div>
              <p>开始离线隐私对话</p>
              <p class="sub-text">所有推理 100% 本地运行，数据零外泄</p>
            </div>
          </div>
          <div class="chat-input-wrapper">
            <textarea id="chat-input" class="chat-input" placeholder="输入消息..." rows="2" disabled></textarea>
            <button id="send-btn" class="btn btn-primary" disabled>发送</button>
          </div>
        </div>
      </section>

      <!-- 知识库页 -->
      <section id="page-knowledge" class="page">
        <div class="page-header">
          <h2>知识库管理</h2>
          <button id="upload-btn" class="btn btn-primary">上传文档</button>
          <input type="file" id="file-input" hidden accept=".pdf,.docx,.txt" />
        </div>
        <div id="knowledge-list" class="list-container">
          <p class="empty-state">尚未上传任何文档</p>
        </div>
      </section>

      <!-- 审计日志页 -->
      <section id="page-audit" class="page">
        <div class="page-header">
          <h2>审计日志</h2>
          <button id="export-logs-btn" class="btn btn-secondary">导出日志</button>
        </div>
        <div id="audit-table-wrapper" class="table-wrapper">
          <table id="audit-table" class="audit-table">
            <thead>
              <tr>
                <th>时间 (相对)</th>
                <th>绝对时间</th>
                <th>类型</th>
                <th>摘要</th>
              </tr>
            </thead>
            <tbody id="audit-tbody">
              <tr><td colspan="4" class="empty-state">点击「导出日志」加载审计数据</td></tr>
            </tbody>
          </table>
        </div>
        <div id="audit-pagination" class="pagination"></div>
      </section>

      <!-- 系统设置页 -->
      <section id="page-settings" class="page">
        <div class="page-header">
          <h2>系统设置</h2>
        </div>
        <div class="settings-container">
          <div class="setting-group">
            <h3>系统状态</h3>
            <div id="system-state" class="state-card">
              <div class="state-row"><span>主线程状态</span><code id="state-master">--</code></div>
              <div class="state-row"><span>活跃 Worker</span><code id="state-workers">--</code></div>
              <div class="state-row"><span>Kill Switch</span><code id="state-ks">--</code></div>
            </div>
          </div>
          <div class="setting-group">
            <h3>硬件信息</h3>
            <div class="state-card">
              <div class="state-row"><span>GPU 显存</span><code id="hw-gpu">--</code></div>
              <div class="state-row"><span>CPU 利用率</span><code id="hw-cpu">--</code></div>
              <div class="state-row"><span>RAM 使用</span><code id="hw-ram">--</code></div>
            </div>
          </div>
          <div class="setting-group">
            <h3>数据安全</h3>
            <div class="state-card">
              <div class="state-row"><span>凭据管理器</span><code id="sec-cred">--</code></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="overlay" class="overlay hidden">
    <div class="overlay-content">
      <p id="overlay-text">系统已锁定</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
